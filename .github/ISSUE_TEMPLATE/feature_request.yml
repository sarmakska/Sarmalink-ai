name: Feature request
description: Suggest an improvement or new feature.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to do that the current SarmaLink-AI can't solve well?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: offer
    attributes:
      label: Would you like to contribute this?
      options:
        - label: I'd like to open a PR for this
        - label: I'd like help / mentorship to open a PR
